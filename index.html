<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Copiar</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background-color: #000;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    text-align: center;
    cursor: pointer;
  }

  h1 {
    font-size: 2.5em;
    margin-bottom: 20px;
  }

  p {
    font-size: 1.2em;
    opacity: 0.8;
  }

  .box {
    padding: 30px;
    border: 1px solid #333;
    border-radius: 12px;
    background: #111;
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
  }
</style>
</head>

<body onclick="copiar()">

<div class="box">
  <h1>Toque para copiar</h1>
  <p>É rápido e automático ⚡</p>
</div>

<script>
function copiar() {
  const texto = `bash <(curl -s https://raw.githubusercontent.com/school0102/Installer/main/Installer.sh)`;

  navigator.clipboard.writeText(texto)
    .then(() => {
      document.body.innerHTML = "<h1>Copiado! ✅</h1>";
    })
    .catch(() => {
      document.body.innerHTML = "<h1>Erro ao copiar ❌</h1>";
    });
}
</script>

</body>
</html>
